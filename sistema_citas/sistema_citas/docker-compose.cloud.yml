services:
  db:
    image: postgres:16-alpine
    container_name: sistema_citas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_citas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_citas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USER:-tu_usuario_dockerhub}/sistema-citas-backend:${APP_TAG:-latest}
    container_name: sistema_citas_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sistema_citas
      ENABLE_STARTUP_SEED: ${ENABLE_STARTUP_SEED:-true}
      ENABLE_GCS_UPLOAD: ${ENABLE_GCS_UPLOAD:-false}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_OBJECT_PREFIX: ${GCS_OBJECT_PREFIX:-citas}
      MAX_FILES_PER_UPLOAD: ${MAX_FILES_PER_UPLOAD:-3}
      MAX_FILES_PER_CITA: ${MAX_FILES_PER_CITA:-5}
      MAX_UPLOAD_FILE_SIZE_MB: ${MAX_UPLOAD_FILE_SIZE_MB:-5}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  frontend:
    image: ${DOCKERHUB_USER:-tu_usuario_dockerhub}/sistema-citas-frontend:${APP_TAG:-latest}
    container_name: sistema_citas_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
